version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pim-postgres
    environment:
      POSTGRES_USER: pim_user
      POSTGRES_PASSWORD: pim_password
      POSTGRES_DB: pim_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pim_user -d pim_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pim-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
